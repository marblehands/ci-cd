name: Validations for Each Commit
run-name: ${{ github.actor }} is pushing to the feature branch 🚀
on:
  push:
    branches:
      - 'features/**'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm ci
      - name: Build app
        run: npm run build
