name: Validations for Each Commit
run-name: ${{ github.actor }} is pushing to the feature branch 🚀
on:
  push:
    branches:
      - 'feature/**'

jobs:
  validations-for-each-commit:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci
      - name: Run linters
        run: npm run lint
      - name: Run tests
        run: npm run test
      - name: Build app
        run: npm run build
